services:
  gemini_dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: custom_gemini_ros2:latest
    container_name: gemini_ros2
    platform: linux/arm64
    privileged: true
    volumes:
      - /dev/bus/usb:/dev/bus/usb
      - .:/workspace/build
    ports:
      - "8765:8765"
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=<CycloneDDS><Domain><General><NetworkInterfaceAddress>lo</NetworkInterfaceAddress></General></Domain></CycloneDDS>
    stdin_open: true 
    tty: true        
    command: /bin/bash

  foxglove:
    build:
      context: .
      dockerfile: Dockerfile
    image: custom_gemini_ros2:latest
    container_name: foxglove_bridge
    platform: linux/arm64
    network_mode: "service:gemini_dev" 
    volumes:                              # <-- Add this block!
      - .:/workspace/build                # <-- Share the workspace
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=<CycloneDDS><Domain><General><NetworkInterfaceAddress>lo</NetworkInterfaceAddress></General></Domain></CycloneDDS>
    depends_on:
      - gemini_dev
    command: /bin/bash -c "source /opt/ros/jazzy/setup.bash && source /workspace/build/install/setup.bash && ros2 run foxglove_bridge foxglove_bridge"